<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./images/Check-Logo.ico">
    <title>Task Ticker</title>
</head>
<body>
    <div class="modal">
        <div class="modal-cont advanced-search-modal">
            <h3 class="advanced-search-title">Advanced Task Search</h3>

            <form action="" class="advanced-search-form">
                <h4 class="form-subsection-title">Main Details</h4>
                <div class="form-row">
                    <label for="search-task-title" class="task-title-label advanced-search-label">Task Title</label>
                    <input type="text" class="search-task-title advanced-search-input" name="search-task-title" id="search-task-title" placeholder="Task Title*" required>
                </div>

                <div class="form-row">
                    <label for="search-task-group" class="task-group-label advanced-search-label">Task Group</label>
                    <input type="text" class="search-task-group advanced-search-input" name="search-task-group" id="search-task-group" placeholder="Task Group (Optional)">
                </div>

                <h4 class="form-subsection-title">Deadline Details</h4>

                <div class="form-row">
                    <span class="task-start-date-label advanced-search-label">From</span>
                    <div class="start-date-input-grid date-input-grid">
                        <input type="text" class="advanced-search-start-day-input advanced-search-date-input" name="advanced-search-start-day-input" placeholder="DD" maxlength="2">
                        <input type="text" class="advanced-search-start-month-input advanced-search-date-input" name="advanced-search-start-month-input" placeholder="MM" maxlength="2">
                        <input type="text" class="advanced-search-start-year-input advanced-search-date-input" name="advanced-search-start-year-input" placeholder="YYYY" maxlength="4">
                    </div>
                </div>

                <div class="form-row">
                    <span class="task-end-date-label advanced-search-label">To</span>
                    <div class="end-date-input-grid date-input-grid">
                        <input type="text" class="advanced-search-end-day-input advanced-search-date-input" name="advanced-search-end-day-input" placeholder="DD" maxlength="2">
                        <input type="text" class="advanced-search-end-month-input advanced-search-date-input" name="advanced-search-end-day-input" placeholder="MM" maxlength="2">
                        <input type="text" class="advanced-search-end-year-input advanced-search-date-input" name="advanced-search-end-day-input" placeholder="YYYY" maxlength="4">
                    </div>
                </div>

                <h4 class="form-subsection-title">Filter Options</h4>

                <div class="filter-options-row">
                    
                    <div class="form-row">
                        <label for="include-completed-tasks" class="include-completed-label advanced-search-label">Include Completed</label>
                        <label class="toggle-switch-label">
                            <input type="checkbox" class="toggle-switch-input include-completed-tasks" name="include-completed-tasks" id="include-completed-tasks">
                            <span class="toggle-switch-slider"></span>
                        </label>
                    </div>

                    <div class="form-row">
                        <label for="filter-results-priority" class="filter-results-priority-label advanced-search-label">Filter Results by Priority</label>
                        <label class="toggle-switch-label">
                            <input type="checkbox" class="toggle-switch-input filter-results-priority choose-one-filter" name="filter-results-priority" id="filter-results-priority">
                            <span class="toggle-switch-slider"></span>
                        </label>
                    </div>

                </div>

                <div class="filter-options-row general-filters-cont">
                    
                    <div class="form-row">
                        <label for="filter-results-earliest" class="filter-results-priority-label advanced-search-label">Filter Results by Earliest First</label>
                        <label class="toggle-switch-label">
                            <input type="checkbox" class="toggle-switch-input filter-results-earliest choose-one-filter" name="filter-results-earliest" id="filter-results-earliest">
                            <span class="toggle-switch-slider"></span>
                        </label>
                    </div>

                    <div class="form-row">
                        <label for="filter-results-latest" class="filter-results-latest-label advanced-search-label">Filter Results by Latest First</label>
                        <label class="toggle-switch-label">
                            <input type="checkbox" class="toggle-switch-input filter-results-latest choose-one-filter" name="filter-results-latest" id="filter-results-latest">
                            <span class="toggle-switch-slider"></span>
                        </label>
                    </div>

                </div>

                <div class="filter-options-row repetitive-tasks-filters-cont">
                    
                    <div class="form-row">
                        <label for="include-repetitive-tasks" class="include-repetitive-tasks-label advanced-search-label">Include Reoccurring Tasks</label>
                        <label class="toggle-switch-label">
                            <input type="checkbox" class="toggle-switch-input include-repetitive-tasks" name="include-repetitive-tasks" id="include-repetitive-tasks">
                            <span class="toggle-switch-slider"></span>
                        </label>
                    </div>

                    <div class="form-row">
                        <label for="only-show-origin" class="only-show-origin-label advanced-search-label">Hide Non-Origin Tasks</label>
                        <label class="toggle-switch-label">
                            <input type="checkbox" class="toggle-switch-input only-show-origin" name="only-show-origin" id="only-show-origin">
                            <span class="toggle-switch-slider"></span>
                        </label>
                    </div>

                </div>
            </form>

            <div class="advanced-search-button-cont">
                <button class="advanced-search-button cancel-button">Cancel</button>
                <button class="advanced-search-button confirm-button">Search</button>
            </div>

        </div>
    </div>

    <div class="page-grid">
        <div class="sidebar-cont">

            <div class="sidebar-header">
                <img src="./images/Check-Logo.svg" alt="Logo" class="logo">
                <h3 class="sidebar-header-text">
                    <a href="https://github.com/Dur4nt3/todo_project" class="header-link" rel="noreferrer noopener" target="_blank">
                    Task Ticker
                    </a>
                </h3>
            </div>

            <div class="sidebar-functionalities-cont">

                <div class="sidebar-functionality-cont add-cont">
                    <img src="./images/Plus-circle.svg" alt="Add" class="functionality-icon">
                    <h3 class="functionality-name">Add Task</h3>
                </div>

                <div class="sidebar-functionality-cont search-cont search-tasks-functionality">
                    <img src="./images/Search.svg" alt="Search" class="functionality-icon">
                    <h3 class="functionality-name">Search</h3>
                </div>

                <div class="sidebar-functionality-cont today-cont today-tasks-functionality">
                    <img src="./images/Today.svg" alt="Today" class="functionality-icon">
                    <h3 class="functionality-name">Today</h3>
                </div>

                <div class="sidebar-functionality-cont upcoming-cont upcoming-tasks-functionality">
                    <img src="./images/Upcoming.svg" alt="Upcoming" class="functionality-icon">
                    <h3 class="functionality-name">Upcoming</h3>
                </div>

                <div class="sidebar-functionality-cont past-due-cont past-due-tasks-functionality">
                    <img src="./images/Hourglass.svg" alt="Past Due" class="functionality-icon">
                    <h3 class="functionality-name">Past Due</h3>
                </div>

                <div class="sidebar-functionality-cont all-cont all-tasks-functionality">
                    <img src="./images/Everything.svg" alt="All Tasks" class="functionality-icon">
                    <h3 class="functionality-name">All Tasks</h3>
                </div>

                <div class="sidebar-functionality-cont completed-cont completed-tasks-functionality">
                    <img src="./images/Completed.svg" alt="Completed" class="functionality-icon">
                    <h3 class="functionality-name">Completed</h3>
                </div>

            </div>

            <div class="sidebar-groups-cont">
                <div class="groups-header">
                    <h3 class="groups-header-text">My Groups</h3>
                    <img src="./images/Edit.svg" alt="Edit Groups" class="edit-groups-icon">
                </div>

                <div class="group-list-cont">
                </div>
            </div>

            <div class="sidebar-settings-cont">
                <div class="sidebar-info-cont">
                    <img src="./images/Settings.svg" alt="Settings" class="info-icon">
                    <h3 class="info-text">Settings</h3>
                </div>

                <div class="sidebar-info-cont">
                    <img src="./images/Help.svg" alt="Help" class="info-icon">
                    <h3 class="info-text">Help</h3>
                </div>
            </div>

        </div>

        <div class="main-cont">
            <div class="search-tab-cont" id="search-tasks-functionality"></div>

            <div class="today-tab-cont" id="today-tasks-functionality"></div>

            <div class="upcoming-tab-cont" id="upcoming-tasks-functionality"></div>

            <div class="past-due-tab-cont" id="past-due-tasks-functionality"></div>
            
            <div class="all-tab-cont" id="all-tasks-functionality"></div>

            <div class="completed-tab-cont" id="completed-tasks-functionality"></div>

            <div class="groups-tab-cont"></div>
        </div>

    </div>
</body>
</html>
